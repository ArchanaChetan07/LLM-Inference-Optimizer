# Values for the prometheus-community/prometheus-adapter Helm chart.
# Install with:
#   helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
#   helm install prom-adapter prometheus-community/prometheus-adapter -f prometheus-adapter-values.yaml
#
# This exposes gateway_queue_depth (scraped from the gateway's /metrics) as a
# Kubernetes custom metric consumable by the HPA in templates/hpa.yaml.

prometheus:
  url: http://prometheus-server.monitoring.svc
  port: 80

rules:
  default: false
  custom:
    - seriesQuery: 'gateway_queue_depth{namespace!="",pod!=""}'
      resources:
        overrides:
          namespace: { resource: "namespace" }
          pod: { resource: "pod" }
      name:
        matches: "gateway_queue_depth"
        as: "gateway_queue_depth"
      metricsQuery: 'avg_over_time(<<.Series>>{<<.LabelMatchers>>}[1m])'

# NOTE: Committing a real API key here would defeat the purpose. In practice:
#   1. Do NOT check a populated Secret into git.
#   2. Create it out-of-band instead:
#        kubectl create secret generic gateway-secrets \
#          --from-literal=api-key=$(openssl rand -hex 32) -n inference
#   3. Or use External Secrets Operator / Sealed Secrets to pull from a
#      real secret store (Vault, AWS Secrets Manager, GCP Secret Manager).
#
# This template is left here only so `helm install` doesn't fail on a missing
# secretKeyRef during a first-time `helm template --dry-run`; in a real
# pipeline, exclude this file and manage the secret via one of the methods
# above instead.
{{- if .Values.createPlaceholderSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: gateway-secrets
type: Opaque
stringData:
  api-key: "CHANGE-ME-BEFORE-PRODUCTION"
{{- end }}

# Model + quantization configuration.
# Swap `model` to something that fits your VRAM. Rough guide:
#   <8GB VRAM  -> Qwen2.5-1.5B-Instruct or TinyLlama-1.1B
#   8-16GB     -> Qwen2.5-3B-Instruct / Llama-3.2-3B-Instruct
#   16-24GB    -> Mistral-7B-Instruct-v0.3 (fp16 tight; int8/fp8 comfortable)
#   40GB+ (A100)-> Llama-3.1-8B / 13B class models

configs:
  fp16:
    model: "Qwen/Qwen2.5-3B-Instruct"
    quantization: null          # native fp16/bf16
    dtype: "bfloat16"
    max_num_seqs: 64
    max_num_batched_tokens: 8192
    gpu_memory_utilization: 0.85

  int8:
    model: "Qwen/Qwen2.5-3B-Instruct"
    quantization: "bitsandbytes"   # vLLM supports bnb int8 load path
    dtype: "bfloat16"
    max_num_seqs: 96
    max_num_batched_tokens: 8192
    gpu_memory_utilization: 0.85

  fp8:
    model: "Qwen/Qwen2.5-3B-Instruct"
    quantization: "fp8"            # vLLM native fp8 (marlin/fp8 kernels, Hopper/Ada best)
    dtype: "auto"
    max_num_seqs: 128
    max_num_batched_tokens: 8192
    gpu_memory_utilization: 0.85

speculative:
  enabled: false
  draft_model: "Qwen/Qwen2.5-0.5B-Instruct"
  num_speculative_tokens: 5
